# Containerized DraftFi (PRD: "easily containerized").
#   docker compose up --build
# Backend on :8000, frontend on :5173. To reach a host-installed Ollama, set the
# provider Base URL to http://host.docker.internal:11434 in the app's LLM panel.
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DRAFTFI_DB_PATH: /data/sandbox.db
      DRAFTFI_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - draftfi-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  draftfi-data:

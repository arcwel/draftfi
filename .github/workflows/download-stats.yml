name: Download stats

# GitHub only exposes the *cumulative* download count per release asset, with
# no history. This job snapshots those counts daily into download-stats.csv so
# you can chart trends over time. Runs on a schedule and can be triggered
# manually from the Actions tab.
on:
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write # to commit the updated CSV

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append current download counts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FILE=download-stats.csv
          [ -f "$FILE" ] || echo "timestamp_utc,tag,asset,download_count" > "$FILE"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          gh api "repos/${{ github.repository }}/releases" --paginate \
            --jq '.[] | .tag_name as $t | .assets[] | [$t, .name, (.download_count|tostring)] | @tsv' \
          | while IFS=$'\t' read -r tag asset count; do
              printf '%s,%s,%s,%s\n' "$TS" "$tag" "$asset" "$count" >> "$FILE"
            done
          echo "Snapshot rows now: $(( $(wc -l < "$FILE") - 1 ))"

      - name: Commit the snapshot
        run: |
          set -euo pipefail
          # `git add` first so a brand-new (untracked) CSV is also detected —
          # `git diff` alone doesn't see untracked files.
          git add download-stats.csv
          if git diff --cached --quiet -- download-stats.csv; then
            echo "No release assets yet — nothing to record."
            exit 0
          fi
          git config user.name "Arkwel AI"
          git config user.email "support@arkwel.ai"
          git commit -m "chore: snapshot release download counts [skip ci]"
          git push

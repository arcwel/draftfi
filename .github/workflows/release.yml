name: Build desktop apps

# Builds self-contained macOS, Windows, and Linux apps. Triggers on a version
# tag (e.g. v0.1.0) and attaches the packaged apps to a GitHub Release. Can also
# be run manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write   # allow the release step to create/update the Release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: DraftFi-macos
          - os: windows-latest
            artifact: DraftFi-windows
          - os: ubuntu-latest
            artifact: DraftFi-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r packaging/requirements-desktop.txt

      # Stamp the app's version from the release tag so the packaged build always
      # reports its own version — otherwise the in-app update check would keep
      # nagging even after the user downloaded the matching release.
      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          python -c "import re, os, pathlib; v = os.environ['GITHUB_REF_NAME'].lstrip('v'); p = pathlib.Path('backend/app/__init__.py'); p.write_text(re.sub(r'__version__ = \".*\"', f'__version__ = \"{v}\"', p.read_text())); print('stamped version', v)"

      - name: Build desktop app
        run: python packaging/build.py

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist_desktop
          zip -ry ../${{ matrix.artifact }}.zip DraftFi.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist_desktop/DraftFi/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist_desktop
          tar -czf ../${{ matrix.artifact }}.tar.gz DraftFi

      - name: Name the artifact file
        id: artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            echo "file=${{ matrix.artifact }}.tar.gz" >> "$GITHUB_OUTPUT"
          else
            echo "file=${{ matrix.artifact }}.zip" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ steps.artifact.outputs.file }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.artifact.outputs.file }}
